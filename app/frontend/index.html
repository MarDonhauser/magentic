<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>magentic</title>
</head>
<body>
<div id="titlebar"></div>
<div id="layout">
    <aside id="sidebar">
        <div id="sidebar-head">⚡ magentic</div>
        <div class="nav-btn" id="nav-overview">▦ Übersicht</div>
        <div class="nav-btn" id="nav-search">🔍 Suche</div>
        <div class="nav-btn" id="nav-timeline">🕐 Verlauf</div>
        <div id="deploy-badge" title="Deploy-Stand — klick für Details"></div>
        <div class="side-label">Sessions</div>
        <div id="sessions"></div>
        <div class="side-label">Todos</div>
        <div id="side-todos"></div>
        <div id="usage-box"></div>
    </aside>
    <main id="main">
        <div id="overview"></div>
        <div id="search-view">
            <div id="search-bar">
                <input class="inline-input wide" id="search-input" placeholder="Volltextsuche über alle Claude-Session-Transkripte… (Enter)">
                <button class="btn" id="search-go">Suchen</button>
            </div>
            <div id="search-results"></div>
        </div>
        <div id="terms"><div id="term-bar"></div><div id="hydra-grid"></div></div>
    </main>
    <aside id="timeline">
        <div id="tl-head"><span>🕐 Verlauf — deine Prompts</span><button class="btn tiny" id="tl-close">✗</button></div>
        <div id="tl-body"><div class="none">lade…</div></div>
    </aside>
</div>
<div id="toast"></div>
<script src="./src/main.js" type="module"></script>
</body>
</html>
